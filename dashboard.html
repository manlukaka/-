<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能课堂语音助手 - 实时大屏</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心修复：Vue 加载完成前隐藏模板，避免闪现 {{ }} 乱码 */
        [v-cloak] { display: none !important; }
        
        .score-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #4ade80; text-shadow: 0 0 20px rgba(74, 222, 128, 0.8); }
            100% { transform: scale(1); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col font-sans overflow-hidden">
    <div id="app" v-cloak class="flex flex-col h-full p-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-800 via-gray-950 to-black">
        
        <div v-if="!isSetupComplete" class="flex-1 flex items-center justify-center">
            <div class="bg-gray-800/80 p-10 rounded-2xl border border-gray-700 shadow-2xl w-96 text-center">
                <h2 class="text-3xl font-bold text-blue-400 mb-6">课堂参数设置</h2>
                <div class="mb-6 text-left">
                    <label class="block text-gray-400 mb-2 text-sm">请输入本节课的小组数量</label>
                    <input v-model.number="groupCount" type="number" min="1" max="50"
                           class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white text-lg focus:outline-none focus:border-blue-500 text-center">
                </div>
                <button @click="startClass" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                    进入大屏模式
                </button>
            </div>
        </div>

        <template v-else>
            <header class="text-center mb-10">
                <h1 class="text-4xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 drop-shadow-lg">
                    🚀 智能课堂积分榜
                </h1>
                <div class="mt-2 text-gray-400 text-sm">
                    状态: <span :class="wsConnected ? 'text-green-400' : 'text-red-400'">{{ wsConnected ? '已连接到语音核心 (WebSocket)' : '等待连接...' }}</span>
                </div>
            </header>

            <main class="flex-1 flex flex-wrap justify-center items-center gap-6 mb-8 px-4 overflow-y-auto no-scrollbar">
                <div v-for="group in groups" :key="group.id" 
                     class="relative flex flex-col items-center justify-center w-48 h-64 bg-gray-800/40 backdrop-blur-md border border-gray-700/50 rounded-2xl shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-all duration-300 hover:border-blue-500/50 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                    <div class="absolute top-6 text-xl font-semibold text-gray-300">第 {{ group.id }} 组</div>
                    <div class="text-7xl font-black mt-4 transition-colors duration-300"
                         :class="{ 'score-pop': group.animate, 'text-blue-400': !group.animate }">
                        {{ group.score }}
                    </div>
                </div>
            </main>

            <footer class="h-48 bg-gray-900/60 rounded-xl border border-gray-700/50 p-4 flex flex-col">
                <h3 class="text-gray-400 text-sm mb-2 border-b border-gray-700 pb-2">🎙️ 实时语音识别日志</h3>
                <div class="flex-1 overflow-y-auto no-scrollbar space-y-2" ref="logContainer">
                    <div v-for="(log, index) in logs" :key="index" class="text-sm font-mono flex items-start gap-4">
                        <span class="text-gray-500">[{{ log.time }}]</span>
                        <span class="text-gray-300 flex-1 flex items-center gap-2">
                            <span>"{{ log.text }}"</span>
                            <span v-if="log.action" class="px-2 py-0.5 rounded bg-blue-500/20 text-blue-300 text-xs border border-blue-500/30">
                                解析成功: {{ log.action }}
                            </span>
                        </span>
                    </div>
                    <div v-if="logs.length === 0" class="text-gray-600 italic">暂无语音输入...</div>
                </div>
                
                <div class="mt-4 flex gap-2" v-if="!wsConnected">
                    <input v-model="testInput" @keyup.enter="simulateVoice" type="text" placeholder="输入测试指令，如: 第二组加5分" 
                           class="flex-1 bg-gray-800 border border-gray-600 rounded px-4 py-2 text-sm text-white focus:outline-none focus:border-blue-400">
                    <button @click="simulateVoice" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm transition-colors">
                        模拟识别
                    </button>
                </div>
            </footer>
        </template>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // 状态控制
                const isSetupComplete = ref(false);
                const groupCount = ref(5);
                
                const groups = ref([]);
                const logs = ref([]);
                const logContainer = ref(null);
                const wsConnected = ref(false);
                const testInput = ref('');

                // 初始化小组数据
                const startClass = () => {
                    if (groupCount.value < 1) groupCount.value = 1;
                    const count = Math.floor(groupCount.value);
                    
                    groups.value = Array.from({ length: count }, (_, i) => ({
                        id: i + 1,
                        score: 0,
                        animate: false
                    }));
                    
                    isSetupComplete.value = true;
                    // 初始化完成后再尝试连接 WebSocket
                    connectWebSocket();
                };

                const processUpdate = (groupId, delta, rawText) => {
                    const targetGroup = groups.value.find(g => g.id === groupId);
                    let actionStr = '';
                    
                    if (targetGroup) {
                        targetGroup.score += delta;
                        actionStr = `第${groupId}组 ${delta > 0 ? '+' : ''}${delta}`;
                        
                        targetGroup.animate = false;
                        setTimeout(() => targetGroup.animate = true, 10);
                        setTimeout(() => targetGroup.animate = false, 400);
                    }

                    logs.value.push({
                        time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                        text: rawText,
                        action: actionStr
                    });

                    nextTick(() => {
                        if (logContainer.value) {
                            logContainer.value.scrollTop = logContainer.value.scrollHeight;
                        }
                    });
                };

                const connectWebSocket = () => {
                    const ws = new WebSocket('ws://localhost:8765');
                    
                    ws.onopen = () => { wsConnected.value = true; };
                    ws.onclose = () => { 
                        wsConnected.value = false; 
                        // 断线重连机制，避免页面卡死
                        setTimeout(connectWebSocket, 3000); 
                    };
                    
                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'update') {
                                processUpdate(data.group_id, data.delta, data.raw_text);
                            } else if (data.type === 'log') {
                                logs.value.push({
                                    time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                                    text: data.raw_text,
                                    action: null
                                });
                                nextTick(() => { logContainer.value.scrollTop = logContainer.value.scrollHeight; });
                            }
                        } catch (e) {
                            console.error("数据解析异常:", e);
                        }
                    };
                };

                const simulateVoice = () => {
                    if (!testInput.value) return;
                    const text = testInput.value;
                    testInput.value = '';

                    const regex = /(?:第)?([一二三四五六七八九十\d]+)(?:组|队|小组)(加|扣|减)([一二三四五六七八九十\d]+)(?:分)/;
                    const match = text.match(regex);
                    
                    if (match) {
                        const groupId = parseInt(match[1]);
                        const action = match[2];
                        const value = parseInt(match[3]);
                        
                        if (!isNaN(groupId) && !isNaN(value)) {
                            const delta = action === '加' ? value : -value;
                            processUpdate(groupId, delta, text);
                            return;
                        }
                    }
                    
                    logs.value.push({ time: new Date().toLocaleTimeString('zh-CN', { hour12: false }), text: text, action: null });
                    nextTick(() => { logContainer.value.scrollTop = logContainer.value.scrollHeight; });
                };

                return { 
                    isSetupComplete, groupCount, startClass,
                    groups, logs, logContainer, wsConnected, testInput, simulateVoice 
                };
            }
        }).mount('#app'); // 显式挂载
    </script>
</body>
</html>
